name: iOS CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # Этап 1: компиляция shared под iOS (Kotlin/Native) — линковка release-фреймворка.
    # Доказывает, что весь общий код собирается под arm64 iPhone.
    - name: Link iOS framework (arm64)
      run: ./gradlew :shared:linkReleaseFrameworkIosArm64 --no-daemon --build-cache

    # Этап 2 (добавляется с Xcode-проектом, фаза iOS): xcodebuild archive
    # CODE_SIGNING_ALLOWED=NO → unsigned .ipa в артефакты (SideStore подпишет на телефоне).

    - name: Upload iOS framework artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: shared-ios-framework
        path: shared/build/bin/iosArm64/releaseFramework/
        retention-days: 7
