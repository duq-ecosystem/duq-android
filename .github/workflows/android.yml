name: Android CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Decode keystore
      if: github.event_name == 'push'
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/duq-release.jks

    # One Gradle invocation for build + tests: avoids a second cold Gradle
    # configuration pass (was two separate `./gradlew` calls ≈ +1 min).
    - name: Build release APK + run unit tests
      run: ./gradlew assembleRelease testReleaseUnitTest --no-daemon --build-cache
      env:
        PORCUPINE_API_KEY: ${{ secrets.PORCUPINE_API_KEY }}
        KEYSTORE_FILE: duq-release.jks
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    # version.json is the update manifest the app polls. It ships AS A RELEASE
    # ASSET (not a VPS file) so the phone fetches it straight from GitHub's CDN
    # via the stable releases/latest/download URL — no VPS, no SSH, no flaky
    # publish. versionCode must match the APK (both = github.run_number).
    - name: Generate update manifest
      if: github.event_name == 'push'
      run: |
        VC=${{ github.run_number }}
        printf '{"versionCode": %s, "versionName": "1.0.%s"}\n' "$VC" "$VC" > version.json
        cat version.json

    - name: Create GitHub Release with APK
      if: github.event_name == 'push'
      id: release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: build-${{ github.run_number }}
        name: "Build #${{ github.run_number }}"
        body: ${{ github.event.head_commit.message }}
        files: |
          app/build/outputs/apk/release/app-release.apk
          version.json
        # NOT a prerelease: the app resolves updates via releases/latest, which
        # ignores prereleases. A normal release makes latest/download resolve.
        prerelease: false
        make_latest: true

    - name: Send release link to Telegram
      if: github.event_name == 'push'
      run: |
        SHORT_SHA=$(git rev-parse --short HEAD)
        MSG=$(git log -1 --format='%s')
        LINK="${{ steps.release.outputs.url }}"
        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d parse_mode="HTML" \
          -d text="✅ <b>duq-android APK ready</b>%0A%0A<code>${SHORT_SHA}</code> — ${MSG}%0A%0A<a href='${LINK}'>Download APK</a>"

    - name: Upload APK artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/apk/release/app-release.apk
        retention-days: 7

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: app/build/reports/tests/
        retention-days: 7
