name: Android CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive   # whisper.cpp (on-device STT) — нужен на фазе audio

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # versionCode непрерывен с монорепо (последний был 319): сдвиг +400 → первый билд > 319.
    - name: Compute versionCode (continuous with monorepo 319)
      run: echo "DUQ_VERSION_CODE=$((GITHUB_RUN_NUMBER + 400))" >> "$GITHUB_ENV"

    # Фаза каркаса/миграции: проверяем КОМПИЛЯЦИЮ (debug, без секретов).
    # Release-подпись + GitHub Release + доставка через AppUpdater включаются на фазе
    # верификации, когда решён keystore-пароль (та же подпись, что в монорепо).
    - name: Build debug APK (compile check)
      run: ./gradlew :androidApp:assembleDebug --no-daemon --build-cache
      env:
        SERVER_TOKEN: ${{ secrets.SERVER_TOKEN }}

    - name: Upload debug APK artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: androidApp-debug
        path: androidApp/build/outputs/apk/debug/androidApp-debug.apk
        retention-days: 7
