org.gradle.jvmargs=-Xmx8192m -Dfile.encoding=UTF-8
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true
# Faster builds: run independent tasks in parallel + reuse the Gradle build cache
# (CI's gradle cache persists the build-cache dir across runs).
org.gradle.parallel=true
org.gradle.caching=true

# --- Kotlin Multiplatform / Compose Multiplatform ---
# iOS targets are declared but only buildable on macOS; on Linux/CI-ubuntu Gradle
# configures them and simply does not run their tasks (no failure).
kotlin.mpp.enableCInteropCommonization=true
kotlin.mpp.androidSourceSetLayoutVersion=2
# Compose-MP resources
org.jetbrains.compose.experimental.uikit.enabled=true
